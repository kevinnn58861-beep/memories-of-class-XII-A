<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENANGAN XII A BEST CLASS - GEN 40 RESILIENCE FORTY</title>
    <style>
        :root {
            --bg: #050810;
            --accent: #00d2ff;
            --card: #111827;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Layar Pembuka */
        #pintu-masuk {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000;
            display: flex; justify-content: center; align-items: center; text-align: center;
        }
        .btn-masuk {
            padding: 15px 40px; background: var(--accent); border: none;
            border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.1rem;
            transition: 0.3s; color: #000;
        }
        .btn-masuk:hover { transform: scale(1.1); box-shadow: 0 0 25px var(--accent); }

        /* Header */
        .hero {
            height: 60vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('header-xii-a.jpg') center/cover;
        }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900; letter-spacing: 2px; }
        .hero p { color: var(--accent); letter-spacing: 5px; margin-top: 10px; font-weight: bold; }

        .container { max-width: 1200px; margin: 0 auto; padding: 50px 20px; }

        .section-header { 
            border-left: 5px solid var(--accent); 
            padding-left: 15px; 
            margin: 60px 0 30px 0; 
        }
        .section-header h2 { font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Grid System */
        .grid-layout {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: var(--card); border-radius: 15px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05); position: relative;
            aspect-ratio: 1 / 1;
        }
        video, img { width: 100%; height: 100%; object-fit: cover; display: block; }

        footer { text-align: center; padding: 100px 0; opacity: 0.5; font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="pintu-masuk">
        <div>
            <h2 style="margin-bottom: 20px; letter-spacing: 3px;">RESILIENCE FORTY</h2>
            <button class="btn-masuk" onclick="mulaiWeb()">BUKA KENANGAN XII A ✨</button>
        </div>
    </div>
    
    <audio id="laguLatar" loop>
        <source src="perunggu.mp3" type="audio/mpeg">
    </audio>

    <header class="hero">
        <h1>XII A</h1>
        <p>MEMORIES OF RESILIENCE FORTY</p>
    </header>

    <div class="container">
        
        <div class="section-header">
            <h2>Video Kenangan XII A</h2>
        </div>
        <div class="grid-layout" id="video-area"></div>

        <div class="section-header">
            <h2>Foto Kenangan XII A</h2>
        </div>
        <div class="grid-layout" id="photo-area"></div>

    </div>

    <footer>
        <p>Dibuat untuk XII A - GEN 40 Resilience Forty &copy; 2026</p>
    </footer>

    <script>
        const audio = document.getElementById('laguLatar');
        
        function mulaiWeb() {
            document.getElementById('pintu-masuk').style.display = 'none';
            audio.play().catch(e => console.log("Gagal putar musik, cek nama file perunggu.mp3"));
        }

        // Generate 33 Video
        const videoArea = document.getElementById('video-area');
        for(let i=1; i<=33; i++) {
            videoArea.innerHTML += `
                <div class="item-card">
                    <video class="vid-player" muted loop playsinline>
                        <source src="videos/xiia-video${i}.mp4" type="video/mp4">
                    </video>
                </div>`;
        }

        // Generate 83 Foto
        const photoArea = document.getElementById('photo-area');
        for(let j=1; j<=83; j++) {
            photoArea.innerHTML += `
                <div class="item-card">
                    <img src="photos/xiia-foto${j}.jpg" loading="lazy" onerror="this.parentElement.style.display='none'">
                </div>`;
        }

        // Auto Play Video saat masuk layar
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.play().catch(() => {});
                else entry.target.pause();
            });
        }, { threshold: 0.2 });

        document.querySelectorAll('.vid-player').forEach(v => observer.observe(v));
    </script>
</body>
</html>
